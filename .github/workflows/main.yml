name: CI/CD Pipeline

on:
  push:
    branches:
      - CourseWork

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create appsettings.json
        run: |
          echo "${{ secrets.APPSETTINGS_JSON }}" > ./TextMe/Backend/TextMe/API/appsettings.json

      - name: Build and Push Backend API Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/textme-api:latest ./TextMe/Backend/TextMe
          docker push ${{ secrets.DOCKER_USERNAME }}/textme-api:latest

      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/textme-frontend:latest ./TextMe/Frontend/textme
          docker push ${{ secrets.DOCKER_USERNAME }}/textme-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to AWS VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
                curl -fsSL https://get.docker.com -o get-docker.sh
                sudo sh get-docker.sh
                sudo usermod -aG docker ubuntu
            fi

            mkdir -p ~/textme
            cd ~/textme
            
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              api:
                image: ${{ secrets.DOCKER_USERNAME }}/textme-api:latest
                restart: always
                ports:
                  - "5000:80"
                environment:
                  - ASPNETCORE_ENVIRONMENT=Production
                  - ASPNETCORE_URLS=http://+:80
              frontend:
                image: ${{ secrets.DOCKER_USERNAME }}/textme-frontend:latest
                restart: always
                ports:
                  - "3000:80"
                depends_on:
                  - api
            EOF
            
            sudo docker compose pull
            sudo docker compose up -d
