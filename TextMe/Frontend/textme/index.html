<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/png" href="/images/TextMeLogo.png" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TextMe</title>

  <style>



    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--page-bg, #0c1014);
      font-family: Verdana, sans-serif;
    }


  </style>

</head>

<body>

<script>
  try {
    var th = localStorage.getItem('textme-theme');
    document.documentElement.setAttribute('data-theme', th === 'light' ? 'light' : 'dark');
  } catch (e) {}
</script>

<div id="root"></div>
<div id="modal-root"></div>

<script type="module" src="/src/app/main.tsx"></script>

</body>

</html>
