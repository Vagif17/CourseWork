version: '3.8'

services:
  api:
    image: ${DOCKER_USERNAME:-local}/textme-api:latest
    build:
      context: ./Backend/TextMe
      dockerfile: Dockerfile
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80

  frontend:
    image: ${DOCKER_USERNAME:-local}/textme-frontend:latest
    build:
      context: ./Frontend/textme
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
